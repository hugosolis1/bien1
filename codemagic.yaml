workflows:
  ios-unsigned:
    name: Planetary Calculator iOS IPA
    max_build_duration: 60
    instance_type: mac_mini_m1
    environment:
      xcode: latest
      flutter: stable
    scripts:
      - name: Flutter get
        script: |
          set -e
          flutter packages pub get

      - name: Build Flutter iOS for device
        script: |
          set -e
          flutter build ios --release --no-codesign

      - name: Create valid IPA
        script: |
          set -e
          
          # Find the built app in release
          APP_PATH=$(find . -name "*.app" -type d | grep -v iphonesimulator | head -1)
          echo "Found app: $APP_PATH"
          
          APP_NAME=$(basename "$APP_PATH")
          echo "App name: $APP_NAME"
          
          # Create proper IPA structure
          mkdir -p Payload
          cp -R "$APP_PATH" "Payload/"
          
          # Verify structure
          ls -la Payload/
          
          # Create IPA
          cd Payload
          zip -r "../PlanetaryCalculator.ipa" *
          cd ..
          
          # Show result
          ls -lh *.ipa
          
          # Copy to artifacts folder
          cp *.ipa $CM_BUILD_DIR/ 2>/dev/null || true

    artifacts:
      - "*.ipa"
