workflows:
  ios-workflow:
    name: iOS Build (Unsigned for TrollStore)
    max_build_duration: 60
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
    scripts:
      - name: Flutter get
        script: |
          flutter packages pub get
      - name: Build iOS project (unsigned)
        script: |
          flutter build ipa --release --no-codesign
    artifacts:
      - build/ios/ipa/*.ipa
