workflows:
  ios-unsigned:
    name: Planetary Calculator iOS IPA
    max_build_duration: 60
    instance_type: mac_mini_m1
    environment:
      xcode: latest
      flutter: stable
    scripts:
      - name: Flutter get
        script: |
          set -e
          flutter packages pub get

      - name: Build Flutter iOS for simulator
        script: |
          set -e
          flutter build ios --simulator --no-codesign

      - name: Find built app
        script: |
          set -e
          find . -name "*.app" -type d 2>/dev/null
          ls -la build/ios/iphonesimulator/ 2>/dev/null || echo "Looking in other places..."

      - name: Create IPA manually
        script: |
          set -e
          APP_PATH=$(find . -name "*.app" -type d -path "*/build/ios/iphonesimulator/*" | head -1)
          if [ -z "$APP_PATH" ]; then
            APP_PATH=$(find . -name "*.app" -type d | head -1)
          fi
          
          echo "Found app at: $APP_PATH"
          
          mkdir -p Payload
          cp -R "$APP_PATH" Payload/App.app
          
          cd Payload
          zip -r ../PlanetaryCalculator_unsigned.ipa .
          cd ..
          
          ls -lh *.ipa
          
          cp *.ipa $CM_BUILD_DIR/ 2>/dev/null || true

    artifacts:
      - path: "*.ipa"
        name: PlanetaryCalculator
      - path: "$CM_BUILD_DIR/*.ipa"
        name: build_artifact
